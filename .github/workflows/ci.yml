name: Zero Trust CI/CD Pipeline

on:
  push:
    branches:
    - main

jobs:

# Pipeline dasar TaskFlow API dari modul sebelumnya
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          echo "Building TaskFlow API..."
          echo "Build completed"

# Jobdesk 1 — Setup & Implementasi Security Scan Job (Hasan)
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:latest'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Generate Cosign Key Pair, Sign, and Verify
        run: |
          cosign generate-key-pair
          cosign sign-blob --yes --tlog-upload=false --key cosign.key sbom.json > sbom.json.sig
          cosign verify-blob --key cosign.pub --signature sbom.json.sig sbom.json
        env:
          COSIGN_PASSWORD: ""
          COSIGN_YES: "true"

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.45.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin
          conftest --version

      - name: Check Policy as Code with Conftest
        run: conftest test implementation/k8s-deployment.yaml -p policy/deployment.rego

# Jobdesk 2 — Implementasi Conditional Deployment Gate (Rafika Az Zahra Kusumastuti)
  deploy:
    name: Deploy
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Verify Deployment Gate
        run: |
          echo "Security scan passed"
          echo "Deployment approved"
          echo "Never Trust, Always Verify"

      - name: Simulate Deployment
        run: |
          echo "Deploying TaskFlow API..."
          echo "Deployment successful"

# Pipeline dasar TaskFlow API dari modul sebelumnya
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, security-scan, deploy]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "Build Result: ${{ needs.build.result }}"
          echo "Security Scan Result: ${{ needs.security-scan.result }}"
          echo "Deploy Result: ${{ needs.deploy.result }}"

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "CI/CD Pipeline completed successfully"
          else
            echo "CI/CD Pipeline failed"
            exit 1
          fi
